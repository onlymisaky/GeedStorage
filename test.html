<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeedStorage Test</title>
  <script  src="./dist/geed-storage.umd.js"></script>
</head>
<body>
  <h1>GeedStorage Test</h1>
  <div id="output"></div>
  <script>
    // 测试 GeedStorage 功能
    console.log('Testing GeedStorage...');
    const output = document.getElementById('output');
    
    // 测试 localStorage 模式
    const storage = new GeedStorage({ type: 'local', prefix: 'test_' });
    
    // 设置值
    storage.set('name', 'GeedStorage');
    storage.set('version', '0.0.1');
    storage.set('features', ['localStorage', 'sessionStorage', 'memoryCache']);
    
    // 获取值
    output.innerHTML += '<p>name: ' + storage.get('name') + '</p>';
    output.innerHTML += '<p>version: ' + storage.get('version') + '</p>';
    output.innerHTML += '<p>features: ' + JSON.stringify(storage.get('features')) + '</p>';
    
    // 删除值
    storage.remove('version');
    output.innerHTML += '<p>After remove version: ' + storage.get('version') + '</p>';
    
    // 测试 sessionStorage 模式
    const sessionStorage = new GeedStorage({ type: 'session', prefix: 'session_' });
    sessionStorage.set('user', { id: 1, name: 'Test User' });
    output.innerHTML += '<p>session user: ' + JSON.stringify(sessionStorage.get('user')) + '</p>';
    
    // 测试 memoryCache 模式
    const memoryStorage = new GeedStorage({ type: 'memory', prefix: 'memory_' });
    memoryStorage.set('temp', 'temporary data');
    output.innerHTML += '<p>memory temp: ' + memoryStorage.get('temp') + '</p>';
    
    console.log('GeedStorage test completed!');
  </script>
</body>
</html>
